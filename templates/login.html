<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FleetMaster Pro - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }
    .login-wrapper {
      width: 100%;
      max-width: 440px;
      animation: fadeInUp 0.6s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #fff;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(102,126,234,0.4);
    }
    .login-logo h2 {
      color: #fff;
      font-weight: 700;
      font-size: 24px;
      margin: 0;
    }
    .login-logo p {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      margin: 4px 0 0;
    }
    .form-floating {
      margin-bottom: 16px;
    }
    .form-floating input {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      height: 56px;
      padding: 16px 16px 0;
    }
    .form-floating input:focus {
      background: rgba(255,255,255,0.1);
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
      color: #fff;
    }
    .form-floating input::placeholder {
      color: rgba(255,255,255,0.3);
    }
    .form-floating label {
      color: rgba(255,255,255,0.5);
      padding: 16px 16px;
    }
    .form-floating input:focus ~ label {
      color: #667eea;
      opacity: 0.8;
    }
    .btn-login {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(102,126,234,0.4);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .alert-custom {
      background: rgba(255,77,77,0.12);
      border: 1px solid rgba(255,77,77,0.25);
      border-radius: 12px;
      color: #ff6b6b;
      font-size: 14px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }
    .alert-success-custom {
      background: rgba(81,207,102,0.12);
      border: 1px solid rgba(81,207,102,0.25);
      border-radius: 12px;
      color: #51cf66;
      font-size: 14px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }
    .footer-text {
      text-align: center;
      margin-top: 20px;
      color: rgba(255,255,255,0.3);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <div class="icon"><i class="fas fa-truck-fast"></i></div>
        <h2>FleetMaster Pro</h2>
        <p>Fleet Management System</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="{% if category == 'danger' %}alert-custom{% elif category == 'success' %}alert-success-custom{% else %}alert-custom{% endif %}">
              <i class="fas fa-{% if category == 'danger' %}exclamation-circle{% elif category == 'success' %}check-circle{% else %}info-circle{% endif %} me-2"></i>
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
        <div class="form-floating">
          <input type="email" class="form-control" id="email" name="email" placeholder="Email address" required autocomplete="email">
          <label for="email"><i class="far fa-envelope me-2"></i>Email address</label>
        </div>
        <div class="form-floating">
          <input type="password" class="form-control" id="password" name="password" placeholder="Password" required autocomplete="current-password">
          <label for="password"><i class="fas fa-lock me-2"></i>Password</label>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          <span id="btnText"><i class="fas fa-arrow-right-to-bracket me-2"></i>Sign In</span>
          <div class="spinner" id="btnSpinner"></div>
        </button>
      </form>
      <div class="footer-text">
        <i class="far fa-copyright me-1"></i> 2025 FleetMaster Pro. All rights reserved.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('loginForm')?.addEventListener('submit', function() {
      const btn = document.getElementById('loginBtn');
      const text = document.getElementById('btnText');
      const spinner = document.getElementById('btnSpinner');
      btn.disabled = true;
      text.style.display = 'none';
      spinner.style.display = 'block';
    });
  </script>
</body>
</html>
