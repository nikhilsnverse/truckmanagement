{% extends "base.html" %}
{% block title %}Add Expense - FleetMaster Pro{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Add Expense</h1>
    <p class="page-subtitle">Record expense for trip #{{ trip.id }}: {{ trip.source }} → {{ trip.destination }}</p>
  </div>
</div>

<div class="row justify-content-center">
  <div class="col-xl-8">
    <div class="glass-card p-4">
      <form method="POST" action="{{ url_for('expenses.add_expense', trip_id=trip.id) }}" enctype="multipart/form-data">
        <div class="row g-4">
          <div class="col-md-6">
            <label class="form-label">Expense Type <span class="text-danger">*</span></label>
            <select name="type" class="form-select" required>
              <option value="">Select Type</option>
              <option value="Fuel">Fuel</option>
              <option value="Toll">Toll</option>
              <option value="Driver_Salary">Driver Salary</option>
              <option value="Maintenance">Maintenance</option>
              <option value="Custom">Custom</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Amount ($) <span class="text-danger">*</span></label>
            <input type="number" step="0.01" name="amount" class="form-control" placeholder="0.00" required>
          </div>
          <div class="col-12">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3" placeholder="Optional description"></textarea>
          </div>
          <div class="col-12">
            <label class="form-label">Bill Image (optional)</label>
            <input type="file" name="bill_image" class="form-control" accept="image/*,.pdf">
          </div>
        </div>
        <div class="mt-4 d-flex gap-2">
          <button type="submit" class="btn btn-primary btn-glow">Add Expense</button>
          <a href="{{ url_for('trips.list_trips') }}" class="btn btn-outline-secondary">Back to Trips</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
